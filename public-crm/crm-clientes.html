<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>ENAR CRM - Clientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/crm-styles.css">
</head>
<body class="crm-page">

  <!-- Header -->
  <header class="crm-header">
    <div class="crm-header-left">
      <img src="img/logo-enar.png" alt="ENAR" class="crm-header-logo" onerror="this.style.display='none'">
      <div>
        <h1>CRM ENAR</h1>
        <div class="crm-header-sub">Gestión de Clientes</div>
      </div>
    </div>
    <nav class="crm-header-nav">
      <a style="opacity:0.4;pointer-events:none;cursor:not-allowed;" title="Próximamente">Dashboard</a>
      <a style="opacity:0.4;pointer-events:none;cursor:not-allowed;" title="Próximamente">Clientes</a>
      <a href="crm-ordenes.html">Órdenes</a>
      <a href="crm-despachos.html">Despachos</a>
      <a style="opacity:0.4;pointer-events:none;cursor:not-allowed;" title="Próximamente">Reportes</a>
      <a href="index.html" title="Portal"><i class="bi bi-grid"></i></a>
      <button id="btnLogout" title="Cerrar sesión"><i class="bi bi-box-arrow-right"></i></button>
    </nav>
  </header>

  <!-- Loading -->
  <div id="loadingScreen" style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div class="crm-loader"><div class="crm-spinner"></div><p>Cargando clientes...</p></div>
  </div>

  <!-- No Access -->
  <div id="noAccess" class="crm-no-access" style="display:none;">
    <i class="bi bi-shield-lock"></i>
    <h2>Sin acceso</h2>
    <p>No tienes permisos para acceder a Clientes.</p>
    <a href="index.html" class="crm-btn crm-btn--primary" style="margin-top:16px;">Ir al Portal</a>
  </div>

  <!-- Main Content -->
  <main id="mainContent" class="crm-container" style="display:none;">
    <!-- KPIs -->
    <div class="crm-kpis">
      <div class="crm-kpi">
        <div class="crm-kpi-label">Total Clientes</div>
        <div class="crm-kpi-value" id="kpiTotal">0</div>
      </div>
      <div class="crm-kpi crm-kpi--green">
        <div class="crm-kpi-label">Saludables</div>
        <div class="crm-kpi-value" id="kpiSaludables">0</div>
      </div>
      <div class="crm-kpi crm-kpi--yellow">
        <div class="crm-kpi-label">En Riesgo</div>
        <div class="crm-kpi-value" id="kpiRiesgo">0</div>
      </div>
      <div class="crm-kpi crm-kpi--red">
        <div class="crm-kpi-label">Inactivos</div>
        <div class="crm-kpi-value" id="kpiInactivos">0</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="crm-filtros">
      <div class="crm-filtro-group" style="flex:1;">
        <label>Buscar</label>
        <input type="text" class="crm-input crm-input--search" id="filtroTexto" placeholder="Nombre, NIT, email, ciudad..." style="width:100%;">
      </div>
      <div class="crm-filtro-group">
        <label>Salud</label>
        <select class="crm-select" id="filtroSalud">
          <option value="">Todos</option>
          <option value="Saludable">Saludable</option>
          <option value="En_Riesgo">En Riesgo</option>
          <option value="Inactivo">Inactivo</option>
        </select>
      </div>
      <div class="crm-filtro-group">
        <label>ABC</label>
        <select class="crm-select" id="filtroABC">
          <option value="">Todos</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="SV">Sin Ventas</option>
        </select>
      </div>
      <div class="crm-filtro-group">
        <label>Riesgo</label>
        <select class="crm-select" id="filtroRiesgo">
          <option value="">Todos</option>
          <option value="Alto">Alto</option>
          <option value="Medio">Medio</option>
          <option value="Bajo">Bajo</option>
        </select>
      </div>
      <div class="crm-filtro-group">
        <label>Tendencia</label>
        <select class="crm-select" id="filtroTendencia">
          <option value="">Todos</option>
          <option value="Creciente">Creciente</option>
          <option value="Estable">Estable</option>
          <option value="Decreciente">Decreciente</option>
        </select>
      </div>
      <div class="crm-filtro-group" style="align-self:flex-end;">
        <button class="crm-btn crm-btn--primary" id="btnNuevoCliente">
          <i class="bi bi-plus-lg"></i> Nuevo Cliente
        </button>
      </div>
    </div>

    <!-- Grid Clientes -->
    <div id="clientesGrid" class="crm-clientes-grid"></div>

    <!-- Paginación -->
    <div id="paginacionClientes"></div>
  </main>

  <!-- Modal Crear/Editar Cliente -->
  <div id="modalCliente" class="crm-modal-overlay">
    <div class="crm-modal">
      <div class="crm-modal-header">
        <h3 id="modalClienteTitulo">Nuevo Cliente</h3>
        <button class="crm-modal-close" onclick="cerrarModal('modalCliente')">&times;</button>
      </div>
      <div class="crm-modal-body">
        <div class="crm-form-row">
          <div class="crm-form-group">
            <label>NIT / Cédula *</label>
            <input type="text" class="crm-input" id="inputNit" placeholder="900.123.456-7" style="width:100%;">
          </div>
          <div class="crm-form-group">
            <label>Nombre / Razón Social *</label>
            <input type="text" class="crm-input" id="inputNombre" placeholder="Nombre completo" style="width:100%;">
          </div>
        </div>
        <div class="crm-form-row">
          <div class="crm-form-group">
            <label>Nombre Comercial</label>
            <input type="text" class="crm-input" id="inputNombreComercial" style="width:100%;">
          </div>
          <div class="crm-form-group">
            <label>Email</label>
            <input type="email" class="crm-input" id="inputEmail" style="width:100%;">
          </div>
        </div>
        <div class="crm-form-row">
          <div class="crm-form-group">
            <label>Teléfono</label>
            <input type="tel" class="crm-input" id="inputTelefono" style="width:100%;">
          </div>
          <div class="crm-form-group">
            <label>Ciudad / Ubicación</label>
            <input type="text" class="crm-input" id="inputCiudad" style="width:100%;">
          </div>
        </div>
        <div class="crm-form-row">
          <div class="crm-form-group">
            <label>Ruta</label>
            <input type="text" class="crm-input" id="inputRuta" style="width:100%;">
          </div>
          <div class="crm-form-group">
            <label>Lista de Precios</label>
            <select class="crm-select" id="inputListaPrecio" style="width:100%;">
              <option value="">Seleccionar</option>
              <option value="L1">L1</option>
              <option value="L4">L4</option>
              <option value="L7">L7</option>
              <option value="L8">L8</option>
              <option value="L9">L9</option>
              <option value="L10">L10</option>
            </select>
          </div>
        </div>
        <div class="crm-form-row">
          <div class="crm-form-group">
            <label>Tipo</label>
            <select class="crm-select" id="inputTipo" style="width:100%;">
              <option value="">Seleccionar</option>
              <option value="Ferretería">Ferretería</option>
              <option value="Constructora">Constructora</option>
              <option value="Distribuidor">Distribuidor</option>
              <option value="mayorista">Mayorista</option>
              <option value="negocio">Negocio</option>
              <option value="persona_natural">Persona Natural</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div class="crm-form-group">
            <label>Segmento</label>
            <select class="crm-select" id="inputSegmento" style="width:100%;">
              <option value="">Seleccionar</option>
              <option value="Pequeño">Pequeño</option>
              <option value="Mediano">Mediano</option>
              <option value="Grande">Grande</option>
            </select>
          </div>
        </div>
        <div class="crm-form-group">
          <label>Estado</label>
          <select class="crm-select" id="inputEstado" style="width:100%;">
            <option value="aprobado">Aprobado</option>
            <option value="pendiente">Pendiente</option>
            <option value="suspendido">Suspendido</option>
          </select>
        </div>
      </div>
      <div class="crm-modal-footer">
        <button class="crm-btn crm-btn--secondary" onclick="cerrarModal('modalCliente')">Cancelar</button>
        <button class="crm-btn crm-btn--primary" id="btnGuardarCliente">
          <i class="bi bi-check-lg"></i> Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Detalle Cliente -->
  <div id="modalDetalle" class="crm-modal-overlay">
    <div class="crm-modal crm-modal--lg">
      <div class="crm-modal-header">
        <h3 id="modalDetalleTitulo">Detalle del Cliente</h3>
        <button class="crm-modal-close" onclick="cerrarModal('modalDetalle')">&times;</button>
      </div>
      <div class="crm-modal-body" id="modalDetalleBody"></div>
      <div class="crm-modal-footer">
        <button class="crm-btn crm-btn--secondary" onclick="cerrarModal('modalDetalle')">Cerrar</button>
        <button class="crm-btn crm-btn--primary" id="btnEditarDesdeDetalle">
          <i class="bi bi-pencil"></i> Editar
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="js/crm-clientes.js"></script>
</body>
</html>
