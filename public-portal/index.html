<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>ENAR Digital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f8f9fa;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      padding: 24px 32px;
      text-align: center;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: #D9232D;
    }
    .header img {
      height: 56px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .header p {
      opacity: 0.85;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* Main */
    .main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 20px 40px;
    }
    .section-title {
      text-align: center;
      margin-bottom: 36px;
      color: #1e3a8a;
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* Grid */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    /* Cards */
    .app-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: #1e293b;
      display: block;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .app-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #D9232D);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .app-card:hover {
      transform: translateY(-6px);
      border-color: #bfdbfe;
      box-shadow: 0 12px 24px rgba(30,58,138,0.1);
      color: #1e293b;
    }
    .app-card:hover::before {
      transform: scaleX(1);
    }

    .app-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .app-card:hover .app-icon {
      transform: scale(1.1);
    }

    .app-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1e3a8a;
    }
    .app-description {
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.6;
      margin: 0;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px 20px;
      color: #94a3b8;
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .apps-grid {
        grid-template-columns: 1fr;
      }
      .header {
        padding: 20px 16px;
      }
      .header img {
        height: 44px;
      }
      .header h1 {
        font-size: 1.3rem;
      }
      .main {
        padding: 32px 16px 24px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <img src="img/logo-enar.png" alt="ENAR" onerror="this.style.display='none'">
    <h1>ENAR Digital</h1>
    <p>Plataforma de herramientas digitales</p>
  </header>

  <main class="main">
    <h2 class="section-title">Selecciona una aplicación</h2>

    <div class="apps-grid">
      <a href="https://enar-b2b.web.app" class="app-card">
        <div class="app-icon">
          <img src="img/icons/pedidos-b2b.png" alt="Pedidos B2B"
               onerror="this.parentElement.innerHTML='<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;48&quot; height=&quot;48&quot; fill=&quot;#1e3a8a&quot; viewBox=&quot;0 0 16 16&quot;><path d=&quot;M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l1.313 7h8.17l1.313-7H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z&quot;/></svg>'">
        </div>
        <h3 class="app-name">Pedidos B2B</h3>
        <p class="app-description">Catálogo de productos, pedidos mayoristas y órdenes de compra para distribuidores.</p>
      </a>

      <a href="https://enar-comercial.web.app" class="app-card">
        <div class="app-icon">
          <img src="img/icons/gestion-comercial.png" alt="Gestión Comercial"
               onerror="this.parentElement.innerHTML='<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;48&quot; height=&quot;48&quot; fill=&quot;#1e3a8a&quot; viewBox=&quot;0 0 16 16&quot;><path fill-rule=&quot;evenodd&quot; d=&quot;M0 0h1v15h15v1H0V0zm14.817 3.113a.5.5 0 0 1 .07.704l-4.5 5.5a.5.5 0 0 1-.74.037L7.06 6.767l-3.656 5.027a.5.5 0 0 1-.808-.588l4-5.5a.5.5 0 0 1 .758-.06l2.609 2.61 4.15-5.073a.5.5 0 0 1 .704-.07z&quot;/></svg>'">
        </div>
        <h3 class="app-name">Gestión Comercial</h3>
        <p class="app-description">Control de ventas, seguimiento de clientes distribuidores y reportes comerciales.</p>
      </a>
    </div>
  </main>

  <footer class="footer">
    ENAR Digital &copy; 2025
  </footer>

</body>
</html>
